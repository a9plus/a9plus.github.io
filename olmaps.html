<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>OLMaps</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<style>

:root{

--bg:#f7f9fc;
--panel:#ffffff;
--text:#17202a;
--muted:#64748b;
--primary:#b8dcff;
--primary-hover:#94caff;
--shadow:0 8px 30px rgba(0,0,0,.15);

}


.dark{

--bg:#101418;
--panel:#1d232b;
--text:#ffffff;
--muted:#cbd5e1;
--primary:#2563eb;

}



*{
box-sizing:border-box;
}



html,body{

height:100%;
margin:0;

font-family:
Roboto,
system-ui,
Arial;

overflow:hidden;

background:var(--bg);
color:var(--text);

}



/* MAP NEVER RESIZES WRONG */

#map{

position:absolute;

inset:0;

z-index:0;

}




.sheet{

position:absolute;

z-index:5;

bottom:0;

left:0;
right:0;


background:var(--panel);

border-radius:32px 32px 0 0;

box-shadow:var(--shadow);


height:48%;

padding:20px;


display:flex;

flex-direction:column;


}



.header{

display:flex;

justify-content:space-between;

align-items:center;

font-size:22px;

font-weight:700;

}



.icon{

font-family:"Material Icons";

cursor:pointer;

user-select:none;

font-size:28px;

}



.content{

flex:1;

overflow-y:auto;

}




.page{

display:none;

}


.page.active{

display:block;

}




h2{

margin:15px 0;

}




label{

display:block;

font-weight:600;

margin-top:14px;

}




input,
select{

width:100%;

padding:14px;

margin-top:7px;


border-radius:18px;

border:1px solid #aaa;

background:transparent;

color:var(--text);

font-size:16px;


}




button{

border:0;

border-radius:22px;

padding:13px 20px;

background:var(--primary);

font-size:16px;

cursor:pointer;

display:flex;

align-items:center;

gap:8px;

}



button:hover{

background:var(--primary-hover);

}



.searchResults{

margin-top:10px;

border-radius:18px;

overflow:hidden;

}



.result{

padding:14px;

background:#eee;

cursor:pointer;

}


.dark .result{

background:#303640;

}



.bottom{

display:flex;

align-items:center;

justify-content:space-between;

padding-top:12px;

}



.progress{

display:flex;

align-items:center;

gap:8px;

}



.dot{

width:10px;
height:10px;

border-radius:50%;

background:#aaa;

}



.dot.active{

background:#4da3ff;

}



.line{

width:25px;

height:3px;

background:#aaa;

}




.settings{


display:none;


position:absolute;

right:20px;

top:65px;


width:min(320px,90vw);


background:var(--panel);

border-radius:24px;

padding:20px;

box-shadow:var(--shadow);

z-index:20;


}



.settings.open{

display:block;

}




@media(max-width:600px){


.sheet{

height:60%;

}


.settings{

position:fixed;

bottom:0;

left:0;

right:0;

top:auto;

width:100%;

border-radius:30px 30px 0 0;


}


}



</style>


</head>


<body>



<div id="map"></div>



<div class="sheet">


<div class="header">

<span>
OLMaps
</span>


<span class="icon" onclick="toggleSettings()">
more_vert
</span>


</div>



<div id="settings" class="settings">


<h3>
Settings
</h3>


<label>
Theme
</label>


<select onchange="changeTheme(this.value)">

<option value="light">
Light
</option>

<option value="dark">
Dark
</option>

</select>


<label>
Units
</label>


<select id="units">

<option>
Miles
</option>

<option>
Kilometers
</option>

</select>


<label>

<input type="checkbox" id="printDark">

Dark map when printing

</label>


</div>




<div class="content">



<div class="page active">


<h2>
Create Trip
</h2>



<label>
Start
</label>


<input id="startInput" placeholder="Search starting point">


<div id="startResults" class="searchResults"></div>




<label>
Destination
</label>


<input id="endInput" placeholder="Search destination">


<div id="endResults" class="searchResults"></div>




<button onclick="useGPS()">

<span class="icon">
my_location
</span>

Use location

</button>



</div>





<div class="page">


<h2>
Travel
</h2>


<label>
Mode
</label>


<select id="mode">


<option value="driving">
🚗 Car
</option>


<option value="cycling">
🚲 Bike
</option>


<option value="walking">
🚶 Walk
</option>


</select>



<label>
Options
</label>


<label>
<input id="avoidTolls" type="checkbox">
Avoid tolls
</label>


<label>
<input id="avoidHighways" type="checkbox">
Avoid highways
</label>


<label>
<input id="residential" type="checkbox">
Prefer residential roads
</label>



</div>





<div class="page">


<h2>
Print Guide
</h2>


<button onclick="generatePDF()">

<span class="icon">
picture_as_pdf
</span>

Export PDF

</button>


</div>



</div>





<div class="bottom">


<div class="progress">

<div class="dot active"></div>

<div class="line"></div>

<div class="dot"></div>

<div class="line"></div>

<div class="dot"></div>


</div>



<button onclick="nextPage()">

Next

<span class="icon">
arrow_forward
</span>

</button>



</div>



</div>



<script>


const map=L.map("map").setView(
[40.1037,-75.2071],
13
);



L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}

).addTo(map);



setTimeout(()=>{

map.invalidateSize();

},500);



window.addEventListener(
"resize",
()=>map.invalidateSize()
);



let start=null;

let end=null;

let route=null;


function toggleSettings(){

document
.getElementById("settings")
.classList.toggle("open");

}



function changeTheme(v){

document.body.classList.toggle(
"dark",
v==="dark"
);

}



async function searchOSM(text,target){


if(text.length<3)return;


let url=
"https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
+
encodeURIComponent(text);



let res=
await fetch(url);



let data=
await res.json();



let box=
document.getElementById(target);



box.innerHTML="";



data.forEach(place=>{


let div=document.createElement("div");

div.className="result";

div.innerText=
place.display_name;



div.onclick=()=>{


let point=[
parseFloat(place.lat),
parseFloat(place.lon)
];



if(target==="startResults")
start=point;

else
end=point;



box.innerHTML="";



L.marker(point)
.addTo(map);



map.setView(point,15);



};



box.appendChild(div);


});


}



document
.getElementById("startInput")
.oninput=e=>
searchOSM(
e.target.value,
"startResults"
);



document
.getElementById("endInput")
.oninput=e=>
searchOSM(
e.target.value,
"endResults"
);



function useGPS(){

navigator.geolocation.getCurrentPosition(
p=>{

start=[
p.coords.latitude,
p.coords.longitude
];


L.marker(start)
.addTo(map)
.bindPopup("Start");


map.setView(start,15);


}

);

}

let pages=document.querySelectorAll(".page");
let dots=document.querySelectorAll(".dot");

let page=0;

let steps=[];

let routeInfo={
distance:0,
time:0
};



function nextPage(){

if(page < pages.length-1){

pages[page].classList.remove("active");
dots[page].classList.remove("active");

page++;

pages[page].classList.add("active");
dots[page].classList.add("active");


}

else{

buildRoute();

}


}





async function buildRoute(){


if(!start || !end){

alert("Choose a start and destination first");

return;

}



let mode=
document.getElementById("mode").value;



let url=

`https://router.project-osrm.org/route/v1/${mode}/`

+
`${start[1]},${start[0]};${end[1]},${end[0]}`

+
`?overview=full&steps=true&geometries=geojson`;




let response=
await fetch(url);



let data=
await response.json();



if(!data.routes){

alert("Route failed");

return;

}




let routeData=
data.routes[0];



routeInfo.distance=
routeData.distance;



routeInfo.time=
routeData.duration;



steps=[];



routeData.legs.forEach(leg=>{


leg.steps.forEach(step=>{


steps.push({

instruction:
formatStep(step),

distance:
step.distance

});


});


});





let coords=
routeData.geometry.coordinates.map(
c=>[
c[1],
c[0]
]
);



if(route){

map.removeLayer(route);

}



route=
L.polyline(
coords,
{
weight:6
}

)
.addTo(map);



map.fitBounds(route.getBounds());



alert(
"Route created!\n"
+
formatDistance(routeInfo.distance)
+
"\n"
+
formatTime(routeInfo.time)
);



}




function formatStep(step){


let type=
step.maneuver.type;


let modifier=
step.maneuver.modifier || "";



let road=
step.name || "unnamed road";



if(type==="depart"){

return "Start on "+road;

}



if(type==="arrive"){

return "Arrive at destination";

}



if(type==="turn"){

return (
"Turn "
+
modifier
+
" onto "
+
road
);

}



if(type==="roundabout"){

return (
"Enter roundabout onto "
+
road
);

}



return (
"Continue on "
+
road
);


}




function formatDistance(meters){


let miles=
meters / 1609.34;


if(
document.getElementById("units").value==="Kilometers"
){

return (
(meters/1000).toFixed(1)
+
" km"
);

}


return (
miles.toFixed(1)
+
" miles"
);


}



function formatTime(seconds){


let minutes=
Math.round(seconds/60);


if(minutes<60){

return minutes+" min";

}


let hours=
Math.floor(minutes/60);


return (
hours
+
" hr "
+
(minutes%60)
+
" min"
);


}





// close settings when clicking elsewhere

document.addEventListener(
"click",
e=>{


let settings=
document.getElementById("settings");


if(
!settings.contains(e.target)
&&
!e.target.closest(".header")
){

settings.classList.remove("open");

}


}
);async function generatePDF(){


if(!steps.length){

await buildRoute();

if(!steps.length){

alert("Create a route first");

return;

}

}



const {jsPDF}=window.jspdf;



let pdf=
new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
});



let y=25;



function text(t,size=12){


pdf.setFontSize(size);

pdf.text(
t,
20,
y
);

y+=8;


}




text(
"OLMaps",
26
);


text(
"The world moves fast.",
14
);


text(
"Your map doesn't have to.",
14
);



y+=8;



pdf.line(
20,
y,
190,
y
);



y+=12;



text(
"TRIP GUIDE",
18
);



let startName=
document.getElementById("startInput").value
||
"Starting point";


let endName=
document.getElementById("endInput").value
||
"Destination";



text(
"From: "+startName
);



text(
"To: "+endName
);



text(
"Distance: "
+
formatDistance(routeInfo.distance)
);



text(
"Time: "
+
formatTime(routeInfo.time)
);



y+=8;



pdf.line(
20,
y,
190,
y
);



y+=12;



text(
"DIRECTIONS",
18
);



let count=1;



for(let s of steps){



if(y>270){


pdf.addPage();

y=25;


}



let d=
formatDistance(s.distance);



let lines=
pdf.splitTextToSize(
`${count}. ${s.instruction} (${d})`,
165
);



pdf.setFontSize(12);


pdf.text(
lines,
20,
y
);



y +=
(lines.length*7)+5;



count++;


}



y+=10;



if(y>270){

pdf.addPage();

y=25;

}



text(
"Generated by OLMaps",
10
);



pdf.save(
"OLMaps-Trip-Guide.pdf"
);



}

</script>


</body>
</html>
