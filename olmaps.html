<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OLMaps</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<style>

:root{

--bg:#f5f7fb;
--panel:#ffffff;
--text:#1b2430;
--button:#b9ddff;
--shadow:0 8px 30px rgba(0,0,0,.18);

}


.dark{

--bg:#111827;
--panel:#1f2937;
--text:#ffffff;
--button:#2563eb;

}



*{

box-sizing:border-box;

}



html,body{

margin:0;
height:100%;

font-family:
Roboto,
system-ui,
Arial;

overflow:hidden;

background:var(--bg);
color:var(--text);

}



#map{

position:absolute;
inset:0;

z-index:0;

}




.sheet{

position:absolute;

z-index:5;

left:0;
right:0;
bottom:0;


height:52%;


background:var(--panel);

border-radius:32px 32px 0 0;

box-shadow:var(--shadow);


padding:20px;


display:flex;

flex-direction:column;


}




.header{

display:flex;

justify-content:space-between;

align-items:center;

font-size:24px;

font-weight:700;

}



.material-icons{

vertical-align:middle;

}



.icon-button{

cursor:pointer;

font-size:30px;

}




.content{

overflow:auto;

flex:1;

}



.page{

display:none;

}



.page.active{

display:block;

}



h2{

margin-top:18px;

}



.address{

background:rgba(120,120,120,.08);

border-radius:22px;

padding:15px;

margin-bottom:15px;

}



.address h3{

margin:0 0 10px 0;

}



input,select{

width:100%;

padding:12px;

margin:5px 0;

border-radius:16px;

border:1px solid #aaa;

background:transparent;

color:var(--text);

font-size:15px;

}



button{

border:0;

border-radius:22px;

padding:12px 18px;

background:var(--button);

font-size:16px;

cursor:pointer;

}



button .material-icons{

font-size:18px;

}



.bottom{

display:flex;

justify-content:space-between;

align-items:center;

padding-top:10px;

}



.progress{

display:flex;

align-items:center;

gap:8px;

}



.dot{

height:11px;

width:11px;

border-radius:50%;

background:#aaa;

}



.dot.active{

background:#4da3ff;

}



.line{

height:3px;

width:25px;

background:#aaa;

}




.settings{

display:none;

position:absolute;

right:20px;

top:65px;

z-index:20;

background:var(--panel);

padding:20px;

border-radius:25px;

box-shadow:var(--shadow);

width:min(300px,90vw);

}



.settings.open{

display:block;

}



@media(max-width:600px){


.sheet{

height:65%;

}


}



</style>

</head>



<body>



<div id="map"></div>



<div class="sheet">



<div class="header">

<div>

<span class="material-icons">
map
</span>

OLMaps

</div>


<span class="material-icons icon-button" onclick="toggleSettings()">
more_vert
</span>


</div>



<div id="settings" class="settings">


<h3>Settings</h3>


<label>
Theme
</label>


<select onchange="theme(this.value)">

<option value="light">
Light
</option>

<option value="dark">
Dark
</option>


</select>



<label>
Units
</label>


<select id="units">

<option value="mi">
Miles
</option>


<option value="km">
Kilometers
</option>


</select>


</div>




<div class="content">



<div class="page active">



<h2>
Create Trip
</h2>




<div class="address">
<h3>Write the address in the form of: 123 street rd city state zip country (no commas)</h3>

<h3>
Start
</h3>


<input id="sNum" placeholder="Number">

<input id="sStreet" placeholder="Street">

<input id="sCity" placeholder="City">

<input id="sState" placeholder="State">

<input id="sZip" placeholder="ZIP">

<input id="sCountry" placeholder="Country">


<button onclick="findAddress('start')">

<span class="material-icons">
location_on
</span>

Set Start

</button>


</div>


<button onclick="addMiddlepoint()">
<span class="material-icons">
add
</span>
Add middlepoint
</button>

<div id="middlepoints"></div>


<div class="address">


<h3>
Destination
</h3>


<input id="dNum" placeholder="Number">

<input id="dStreet" placeholder="Street">

<input id="dCity" placeholder="City">

<input id="dState" placeholder="State">

<input id="dZip" placeholder="ZIP">

<input id="dCountry" placeholder="Country">


<button onclick="findAddress('end')">

<span class="material-icons">
flag
</span>

Set Destination

</button>


</div>



<button onclick="gps()">

<span class="material-icons">
my_location
</span>

Use Current Location

</button>



</div>



<div class="page">



<h2>
Travel Options
</h2>


<label>
Mode
</label>


<select id="mode">

<option value="driving">
Car
</option>


<option value="cycling">
Bike
</option>


<option value="walking">
Walk
</option>


</select>



<label>
<input type="checkbox" id="tolls">
Avoid tolls
</label>


<label>
<input type="checkbox" id="highways">
Avoid highways
</label>


<label>
<input type="checkbox" id="residential">
Prefer residential roads
</label>



</div>



<div class="page">


<h2>
Print Guide
</h2>


<button onclick="pdf()">

<span class="material-icons">
picture_as_pdf
</span>

Export PDF

</button>


</div>



</div>



<div class="bottom">


<div class="progress">

<div class="dot active"></div>

<div class="line"></div>

<div class="dot"></div>

<div class="line"></div>

<div class="dot"></div>


</div>


<button onclick="next()">

Next →

</button>


</div>



</div>


<script>


const map =
L.map("map")
.setView(
[40.1037,-75.2071],
13
);



L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{

maxZoom:19,

attribution:"© OpenStreetMap"

}

).addTo(map);



setTimeout(
()=>map.invalidateSize(),
500
);



window.onresize=()=>map.invalidateSize();


let middlepoints = [];
    
let start=null;

let end=null;

let route=null;

let steps=[];

let info={};

let markers={};


let pages=
document.querySelectorAll(".page");


let dots=
document.querySelectorAll(".dot");


let current=0;



function toggleSettings(){

document
.getElementById("settings")
.classList.toggle("open");

}



function theme(v){

document.body.classList.toggle(
"dark",
v==="dark"
);

}



function build(type){


let p=
type==="start"
?"s"
:"d";


return [

document.getElementById(p+"Num").value,

document.getElementById(p+"Street").value,

document.getElementById(p+"City").value,

document.getElementById(p+"State").value,

document.getElementById(p+"Zip").value,

document.getElementById(p+"Country").value

].join(" ");


}


async function geocode(address){

    try{

        let url =
        "https://nominatim.openstreetmap.org/search" +
        "?format=json&limit=1&q=" +
        encodeURIComponent(address);


        let res =
        await fetch(url);


        let data =
        await res.json();


        return data[0] || null;


    }catch(e){

        console.error(e);

        return null;

    }

}




let startMarker=null;
let endMarker=null;



function placeMarker(type,point,text){


    if(markers[type]){

map.removeLayer(markers[type]);

}



    let marker =
    L.marker(point)
    .addTo(map)
    .bindPopup(text);



    if(type==="start"){

        startMarker=marker;

    }else{

        endMarker=marker;

    }



    marker.openPopup();


    map.setView(point,15);
markers[type]=marker;

}





async function findAddress(type){


    let address =
    build(type);



    if(address.trim()===""){

        alert("Fill out the address");

        return;

    }



    let result =
    await geocode(address);



    if(!result){

        alert(
        "Address not found:\n\n"+
        address
        );

        return;

    }



    let point=[

        Number(result.lat),

        Number(result.lon)

    ];



    if(type==="start"){

        start=point;

    }else{

        end=point;

    }



    placeMarker(
        type,
        point,
        result.display_name
    );


}




function gps(){


navigator.geolocation.getCurrentPosition(
pos=>{


start=[

pos.coords.latitude,

pos.coords.longitude

];



placeMarker(

"start",

start,

"Current location"

);



});


}



function addMiddlepoint(){

let id = middlepoints.length;


middlepoints.push({
    coords:null
});


let box =
document.createElement("div");


box.className="address";


box.id="mid"+id;



box.innerHTML=`

<h3>
Middlepoint ${id+1}
</h3>


<input id="m${id}Num" placeholder="Number">

<input id="m${id}Street" placeholder="Street">

<input id="m${id}City" placeholder="City">

<input id="m${id}State" placeholder="State">

<input id="m${id}Zip" placeholder="ZIP">

<input id="m${id}Country" placeholder="Country">



<button onclick="setMiddlepoint(${id})">

<span class="material-icons">
location_on
</span>

Set Middlepoint

</button>



<button onclick="removeMiddlepoint(${id})">

<span class="material-icons">
delete
</span>

Remove

</button>

`;



document
.getElementById("middlepoints")
.appendChild(box);


}async function setMiddlepoint(id){


let address = [

document.getElementById(`m${id}Num`).value,

document.getElementById(`m${id}Street`).value,

document.getElementById(`m${id}City`).value,

document.getElementById(`m${id}State`).value,

document.getElementById(`m${id}Zip`).value,

document.getElementById(`m${id}Country`).value

].join(" ");



let result =
await geocode(address);



if(!result){

alert(
"Middlepoint not found:\n\n"
+
address
);

return;

}



let point=[

Number(result.lat),

Number(result.lon)

];



middlepoints[id].coords = point;



placeMarker(

"mid"+id,

point,

"Middlepoint "+(id+1)

);



alert(
"Middlepoint "+(id+1)+" set!"
);


}    function removeMiddlepoint(id){

let box =
document.getElementById(
"mid"+id
);


if(box){

box.remove();

}


}


async function makeRoute(){

if(!start || !end){

alert(
"Set both start and destination first"
);

return;

}


let mode =
document.getElementById("mode").value;



// Build the complete trip order

let points = [
    start
];


// Add middlepoints if they exist

for(let i = 0; i < middlepoints.length; i++){

    let p = middlepoints[i].coords;

    if(p){

        points.push(p);

    }

}


// Finish with destination

points.push(end);




// Convert to OSRM format

let coords =
points
.map(
p => `${p[1]},${p[0]}`
)
.join(";");



let url =

`https://router.project-osrm.org/route/v1/${mode}/${coords}`
+
`?overview=full`
+
`&steps=true`
+
`&geometries=geojson`;



let res =
await fetch(url);



let data =
await res.json();



if(!data.routes){

alert(
"No route found"
);

return;

}



let r =
data.routes[0];



info.distance =
r.distance;


info.time =
r.duration;



steps=[];



// Collect every instruction from every leg

r.legs.forEach(leg=>{


leg.steps.forEach(step=>{


steps.push({

text:
makeInstruction(step),


distance:
step.distance


});


});


});





let coordsOnMap =
r.geometry.coordinates.map(
c=>[
c[1],
c[0]
]
);



if(route){

map.removeLayer(route);

}



route =
L.polyline(
coordsOnMap,
{

weight:6

}

)
.addTo(map);



map.fitBounds(
route.getBounds()
);



alert(

"Route created!\n\n"
+
distanceText(info.distance)
+
"\n"
+
timeText(info.time)
+
"\n"
+
points.length
+
" stops"

);



}




function makeInstruction(step){


let type =
step.maneuver.type;


let modifier =
step.maneuver.modifier || "";

let road =
step.name || "unnamed road";



if(type==="depart"){

return "Start on "+road;

}


if(type==="arrive"){

return "Arrive at destination";

}



if(type==="turn"){

return (
"Turn "+
modifier+
" onto "+
road
);

}



if(type==="roundabout"){

return (
"Enter roundabout onto "+
road
);

}



return "Continue on "+road;


}





function distanceText(m){


if(
document.getElementById("units").value==="km"
){

return(
(m/1000).toFixed(1)
+
" km"
);

}



return(
(m/1609.34).toFixed(1)
+
" miles"
);


}





function timeText(s){


let min=
Math.round(s/60);



if(min<60){

return min+" min";

}



return(
Math.floor(min/60)
+
" hr "
+
min%60
+
" min"
);


}




function next(){

    console.log("Next clicked", current);


    if(current < pages.length - 1){

        pages[current].classList.remove("active");

        dots[current].classList.remove("active");


        current++;


        pages[current].classList.add("active");

        dots[current].classList.add("active");


    }
    else{

        makeRoute();

    }

}

async function pdf(){


if(!steps.length){

await makeRoute();


if(!steps.length){

alert(
"Make a route first"
);

return;

}


}



const {jsPDF} =
window.jspdf;



let doc =
new jsPDF();



let y=25;



function write(text,size=12){


doc.setFontSize(size);


let lines =
doc.splitTextToSize(
text,
170
);


doc.text(
lines,
20,
y
);


y +=
(lines.length*7)+5;


}





write(
"OLMaps",
26
);


write(
"The world moves fast.\nYour map doesn't have to.",
14
);



y+=5;



doc.line(
20,
y,
190,
y
);



y+=10;



write(
"TRIP GUIDE",
18
);



write(
"Distance: "
+
distanceText(info.distance)
);



write(
"Time: "
+
timeText(info.time)
);



y+=5;



write(
"DIRECTIONS",
18
);



let num=1;



for(let s of steps){


if(y>270){


doc.addPage();

y=25;


}



write(
num+
". "+
s.text+
"\n"+
distanceText(s.distance)
);



num++;


}



y+=10;



doc.line(
20,
y,
190,
y
);



y+=10;



write(
"Generated with OLMaps",
10
);



doc.save(
"OLMaps-Trip-Guide.pdf"
);



}




</script>


</body>

</html>
