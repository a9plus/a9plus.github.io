BLOCK.GRASS,

// TEXTURE GENERATOR


function textureCanvas(draw){

let c=document.createElement("canvas");

c.width=16;
c.height=16;


let ctx=c.getContext("2d");


draw(ctx);



let tex=new THREE.CanvasTexture(c);

tex.magFilter=THREE.NearestFilter;

tex.colorSpace=THREE.SRGBColorSpace;


return tex;

}





function noise(base,amount){

return Math.floor(
base+(Math.random()*amount*2-amount)
);

}







// GRASS

let grassTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


let green=
noise(150,30);


ctx.fillStyle=
`rgb(${noise(40,10)},${green},${noise(40,10)})`;


ctx.fillRect(
x,y,1,1
);


}

}


});






// DIRT

let dirtTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


ctx.fillStyle=

`rgb(${noise(130,20)},${noise(80,15)},${noise(40,10)})`;


ctx.fillRect(
x,y,1,1
);


}

}


});







// STONE

let stoneTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


let n=noise(125,25);


ctx.fillStyle=
`rgb(${n},${n},${n})`;


ctx.fillRect(
x,y,1,1
);


}

}


});








// SAND WAVY PATTERN

let sandTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


let wave=
Math.sin(x*.8+y*.5)*10;


ctx.fillStyle=

`rgb(
${noise(225+wave,15)},
${noise(210+wave,15)},
${noise(140+wave,10)}
)`;


ctx.fillRect(
x,y,1,1
);


}

}


});







// WOOD

let woodTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


let stripe=
Math.sin(x*.8)*20;


ctx.fillStyle=

`rgb(
${noise(130+stripe,15)},
${noise(75+stripe,10)},
${noise(30,8)}
)`;


ctx.fillRect(
x,y,1,1
);


}

}


});







// LEAVES

let leafTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

function updateHotbar(){ 
  hotbar.innerHTML=""; 
  
  for(let i=0; i<hotbarBlocks.length; i++){ 
    let slot=document.createElement("div"); 
    slot.className="slot"; 
    
    if(hotbarBlocks[i]==selectedBlock) slot.classList.add("active"); 
    
    let img=document.createElement("canvas"); 
    img.width=32; 
    img.height=32; 
    let ctx=img.getContext("2d"); 
    
    let tex=materials[hotbarBlocks[i]].map; 
    
    // Fallback lookups to ensure Three.js provides the raw image element
    let actualImage = tex && (tex.image || (tex.source && tex.source.data) || tex.element);
    
    if(actualImage){ 
      ctx.imageSmoothingEnabled=false; 
      ctx.drawImage( actualImage, 0, 0, 32, 32 ); 
    } 
    
    // Create the HTML img element instead of using slot.style.backgroundImage
    let thumbnailImg = document.createElement("img");
    thumbnailImg.src = img.toDataURL();
    thumbnailImg.className = "hotbar-icon";
    
    // Append the image inside the slot
    slot.appendChild(thumbnailImg);
    
    hotbar.appendChild(slot); 
  } 
}

function exportWorld() {
  const allData = {};
  
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    allData[key] = localStorage.getItem(key);
  }
  
  const jsonString = JSON.stringify(allData, null, 2);
  const blob = new Blob([jsonString], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  
  const link = document.createElement("a");
  link.href = url;
  link.download = "minycraft_world.json";
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function importWorld() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";

  input.onchange = (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const importedData = JSON.parse(e.target.result);
        localStorage.clear();

        for (const key in importedData) {
          localStorage.setItem(key, importedData[key]);
        }

        location.reload();
      } catch (error) {
        alert("Invalid world file!");
      }
    };
    reader.readAsText(file);
  };

  input.click();
}

// ---------- CHUNKS ----------

let chunks={};



function chunkKey(x,z){

return x+","+z;

}


function blockKey(x,y,z){

return x+","+y+","+z;

}





function getChunk(cx,cz){ 
  let k=chunkKey(cx,cz); 
  
  if(!chunks[k]){ 
    chunks[k]={ 
      blocks:{}, 
      mesh:null, 
      cx:cx, 
      cz:cz 
    }; 
    
    // Check if the browser remembers this specific chunk key
    let savedData = localStorage.getItem(`chunk_${k}`);
    
    if (savedData) {
      // If it exists, unpack user's saved block layout directly into the chunk!
      chunks[k].blocks = JSON.parse(savedData);
    }
  } 
  
  return chunks[k]; 
}





function setBlock(cx,cz,x,y,z,b){

let c=getChunk(
cx,
cz
);


let k=blockKey(
x,
y,
z
);


if(b)

c.blocks[k]=b;

else

delete c.blocks[k];

}





function getBlock(x,y,z){


let cx=Math.floor(
x/CHUNK_SIZE
);


let cz=Math.floor(
z/CHUNK_SIZE
);



let lx=x-cx*CHUNK_SIZE;

let lz=z-cz*CHUNK_SIZE;



let c=chunks[
chunkKey(cx,cz)
];



if(!c)
return 0;



return c.blocks[
blockKey(lx,y,lz)
]||0;


}






// ---------- TERRAIN ----------


function terrainHeight(x, z) {
    // 1. Faster biome selector wave (tighter frequency means quicker shifting)
    let biomeWave = (Math.sin(x * 0.04) + Math.cos(z * 0.04)) / 2.0;
    let biomeFactor = (biomeWave + 1.0) / 2.0; // Maps smoothly from 0.0 to 1.0

    // 2. Profile A: Your classic gentle wavy plains
    let wavyNoise = Math.sin(x * 0.08) + Math.cos(z * 0.1) + Math.sin((x + z) * 0.04);
    let wavyHeight = 8 + (wavyNoise * 2.5);

    // 3. Profile B: Jagged, steep mountain peaks 
    let mountainNoise = Math.sin(x * 0.15) * Math.cos(z * 0.15) + Math.sin(x * 0.05) + Math.cos(z * 0.05);
    let mountainHeight = 16 + (mountainNoise * 8);

    // 4. Smoothly blend the regions together
    let finalHeight = (wavyHeight * (1.0 - biomeFactor)) + (mountainHeight * biomeFactor);
    
    return Math.floor(finalHeight);
}






function generateChunk(cx,cz){
    let c=getChunk( cx, cz );
    if(Object.keys(c.blocks).length) return;
    
    const SEA_LEVEL = 5;
    
    for(let x=0;x<CHUNK_SIZE;x++){
        for(let z=0;z<CHUNK_SIZE;z++){
            let wx= cx*CHUNK_SIZE+x;
            let wz= cz*CHUNK_SIZE+z;
            let h = terrainHeight( wx, wz );
            
            let isRocky = (Math.sin(wx * 0.15) + Math.cos(wz * 0.15)) > 0.6;
            
            let isBeach = false;
            if (h >= SEA_LEVEL && h <= SEA_LEVEL + 2) {
                isBeach = true;
            } else if (h < SEA_LEVEL) {
                isBeach = true;
            } else {
                for (let dx = -3; dx <= 3; dx++) {
                    for (let dz = -3; dz <= 3; dz++) {
                        if (Math.abs(dx) + Math.abs(dz) <= 3) {
                            let nh = terrainHeight(wx + dx, wz + dz);
                            if (nh < SEA_LEVEL) {
                                isBeach = true;
                                break;
                            }
                        }
                    }
                    if (isBeach) break;
                }
            }

            for(let y=0;y<=h;y++){
                let b;
                if (y === 0) {
                    b = BLOCK.STONE;
                } else if(y==h){
                    if (isBeach) b = BLOCK.SAND;
                    else if (isRocky) b = BLOCK.STONE;
                    else b = BLOCK.GRASS;
                } else if(y>h-3){
                    if (isBeach) b = BLOCK.SAND;
                    else if (isRocky) b = BLOCK.STONE;
                    else b = BLOCK.DIRT;
                } else {
                    b = BLOCK.STONE;
                }
                setBlock( cx, cz, x, y, z, b );
            }
            
            if(h < SEA_LEVEL){
    for(let y=h+1; y<=SEA_LEVEL; y++){
        setBlock( cx, cz, x, y, z, BLOCK.WATER_STATIC );
    }
}

            
            let treeHash = Math.abs(Math.sin(wx * 12.9898 + wz * 78.233) * 43758.5453) % 1;
            
            if( treeHash < 0.035 && h>SEA_LEVEL && !isBeach && !isRocky ){
                for(let y=1;y<=4;y++){
                    setBlock( cx, cz, x, h+y, z, BLOCK.WOOD );
                }
                for(let xx=-2;xx<=2;xx++){
                    for(let zz=-2;zz<=2;zz++){
                        if( Math.abs(xx)+Math.abs(zz)<4 ){
                            setBlock( cx, cz, x+xx, h+5, z+zz, BLOCK.LEAF );
                        }
                    }
                }
            }
        }
    }
}

function visibleBlock(x,y,z){

getBlock(x-1,y,z)==0 ||

getBlock(x,y+1,z)==0 ||

getBlock(x,y-1,z)==0 ||

getBlock(x,y,z+1)==0 ||

);

function rebuildChunk(cx,cz){

let c=getChunk(
cx,
cz
);



if(c.mesh){

scene.remove(
c.mesh
);

}




let group=
new THREE.Group();





for(let k in c.blocks){


let p=
k.split(",").map(Number);



let wx=
cx*CHUNK_SIZE+p[0];


let wz=
cz*CHUNK_SIZE+p[2];





if(!visibleBlock(
wx,
p[1],
wz
))
continue;





let blockValue = c.blocks[k];
let materialKey = typeof blockValue === "string" ? parseInt(blockValue.split("_")[0]) : blockValue;
let mesh = new THREE.Mesh(cubeGeo, materials[materialKey]);



mesh.position.set(

wx+.5,

p[1]+.5,

wz+.5

);





mesh.userData.block=true;


mesh.userData.pos=[

wx,

p[1],

wz

];



group.add(mesh);



}




scene.add(group);


c.mesh=group;


}




let autosaveTimeout;

function triggerAutosave() {
  // 1. If you are clicking fast to break/place multiple blocks, 
  // clear the old timer so the game doesn't stutter or freeze.
  clearTimeout(autosaveTimeout);

  // 2. Wait 500 milliseconds (half a second) of quiet time before saving.
  autosaveTimeout = setTimeout(() => {
    
    // 3. Loop through every single active chunk in your game engine memory
    for (let key in chunks) {
      let c = chunks[key];
      
      // Check if the chunk exists and has blocks placed inside it
      if (c && c.blocks && Object.keys(c.blocks).length > 0) {
        
        // 4. Pack the entire chunk's block object into a tiny JSON string 
        // Example structure saved: {"0,5,0": 1, "0,4,0": 3}
        let packedChunkData = JSON.stringify(c.blocks);
        
        // 5. Store it directly in LocalStorage labeled by its unique chunk key (like "chunk_0,0")
        localStorage.setItem(`chunk_${key}`, packedChunkData);
        
      } else {
        // If a chunk becomes completely empty (you broke all the custom blocks), 
        // remove its save file so it doesn't take up empty storage space.
        localStorage.removeItem(`chunk_${key}`);
      }
    }
    
    console.log("Minycraft Chunk-Autosave completed in background!");
  }, 500); // 500ms delay
}

function tick3DWaterPhysics() {
    let activeWaterBlocks = [];
    let sourceMap = {};
    for (let ck in chunks) {
        let chunk = chunks[ck];
        for (let bk in chunk.blocks) {
            let val = chunk.blocks[bk];
            let isSource = val === BLOCK.WATER;
            let isFlow = typeof val === "string" && val.startsWith(BLOCK.WATER + "_F_");
            if (isSource || isFlow) {
                let localPos = bk.split(",").map(Number);
                let wx = chunk.cx * CHUNK_SIZE + localPos[0];
                let wz = chunk.cz * CHUNK_SIZE + localPos[2];
                let currentLvl = isSource ? 4 : parseInt(val.split("_F_")[1]);
                activeWaterBlocks.push({ x: wx, y: localPos[1], z: wz, lvl: currentLvl, source: isSource });
                if (isSource) sourceMap[`${wx},${localPos[1]},${wz}`] = true;
            }
        }
    }
    let newBlocksToPlace = [];
    let blocksToRemove = [];
    let chunksToRebuild = new Set();
    function checkBlock(x, y, z) {
        if (y < 0) return -1;
        let b = getBlock(x, y, z);
        if (b === BLOCK.WATER) return 4;
        if (typeof b === "string" && b.startsWith(BLOCK.WATER + "_F_")) return parseInt(b.split("_F_")[1]);
        return b;
    }
    activeWaterBlocks.forEach(w => {
        let blockBelow = getBlock(w.x, w.y - 1, w.z);
        let hasParentSource = false;
        if (!w.source) {
            let traceNeighbors = [
                {x: w.x, y: w.y+1, z: w.z}, {x: w.x+1, y: w.y, z: w.z},
                {x: w.x-1, y: w.y, z: w.z}, {x: w.x, y: w.y, z: w.z+1}, {x: w.x, y: w.y, z: w.z-1}
            ];
            traceNeighbors.forEach(tn => {
                let nbLvl = checkBlock(tn.x, tn.y, tn.z);
                if (nbLvl > w.lvl || (tn.y === w.y + 1 && nbLvl === 4)) hasParentSource = true;
            });
            if (!hasParentSource) {
                blocksToRemove.push({ x: w.x, y: w.y, z: w.z });
                return;
            }
        }
        if (w.y - 1 < 0) return;
        if (blockBelow === BLOCK.AIR) {
            let downLvl = w.source ? 4 : w.lvl;
            newBlocksToPlace.push({ x: w.x, y: w.y - 1, z: w.z, lvl: downLvl });
        } else {
            let spreadLvl = w.lvl - 1;
            if (spreadLvl > 0) {
                let neighbors = [
                    { x: w.x + 1, y: w.y, z: w.z },
                    { x: w.x - 1, y: w.y, z: w.z },
                    { x: w.x, y: w.y, z: w.z + 1 },
                    { x: w.x, y: w.y, z: w.z - 1 }
                ];
                neighbors.forEach(n => {
                    let targetRawBlock = getBlock(n.x, n.y, n.z);
                    let targetWaterLvl = checkBlock(n.x, n.y, n.z);
                    if (targetRawBlock === BLOCK.AIR || (typeof targetRawBlock === "string" && targetRawBlock.startsWith(BLOCK.WATER + "_F_") && targetWaterLvl < spreadLvl)) {
                        newBlocksToPlace.push({ x: n.x, y: n.y, z: n.z, lvl: spreadLvl });
                    }
                });
            }
        }
    });
    blocksToRemove.forEach(b => {
        let cx = Math.floor(b.x / CHUNK_SIZE);
        let cz = Math.floor(b.z / CHUNK_SIZE);
        let lx = b.x - cx * CHUNK_SIZE;
        let lz = b.z - cz * CHUNK_SIZE;
        setBlock(cx, cz, lx, b.y, lz, BLOCK.AIR);
        chunksToRebuild.add(chunkKey(cx, cz));
    });
    newBlocksToPlace.forEach(nb => {
        if (nb.y < 0) return;
        let cx = Math.floor(nb.x / CHUNK_SIZE);
        let cz = Math.floor(nb.z / CHUNK_SIZE);
        let lx = nb.x - cx * CHUNK_SIZE;
        let lz = nb.z - cz * CHUNK_SIZE;
        let existingRaw = getBlock(nb.x, nb.y, nb.z);
        let existingLvl = checkBlock(nb.x, nb.y, nb.z);
        if (existingRaw === BLOCK.AIR || (typeof existingRaw === "string" && existingRaw.startsWith(BLOCK.WATER + "_F_") && existingLvl < nb.lvl)) {
            let valueToStore = nb.lvl === 4 ? BLOCK.WATER : BLOCK.WATER + "_F_" + nb.lvl;
            setBlock(cx, cz, lx, nb.y, lz, valueToStore);
            chunksToRebuild.add(chunkKey(cx, cz));
        }
    });
    chunksToRebuild.forEach(ckey => {
        let p = ckey.split(",").map(Number);
        rebuildChunk(p[0], p[1]);
        triggerAutosave();
    });
    activeWaterBlocks = null;
    newBlocksToPlace = null;
    blocksToRemove = null;
}

// ---------- COLLISION ----------



function solid(x,y,z){
    let b = getBlock( Math.floor(x), Math.floor(y), Math.floor(z) );
    if (b === 0) return false;
    if (b === BLOCK.WATER || b === BLOCK.WATER_STATIC) return false;
    if (typeof b === "string" && b.startsWith(BLOCK.WATER + "_F_")) return false;
    return true;
}






function collision(x,y,z){


let r=player.radius;

let h=player.height;



return(

solid(x-r,y,z-r) ||

solid(x+r,y,z-r) ||

solid(x-r,y,z+r) ||

solid(x+r,y,z+r) ||


solid(x-r,y+h,z-r) ||

solid(x+r,y+h,z-r) ||

solid(x-r,y+h,z+r) ||

solid(x+r,y+h,z+r)

);



}







function physics(){
    let bAtPlayer = getBlock(Math.floor(player.x), Math.floor(player.y - 1), Math.floor(player.z));
    let inWater = bAtPlayer === BLOCK.WATER || bAtPlayer === BLOCK.WATER_STATIC || (typeof bAtPlayer === "string" && bAtPlayer.startsWith(BLOCK.WATER + "_F_"));

    if (inWater) {
        player.vy -= .004;
        player.ground = true; 
    } else {
        player.vy -= .012;
    }

    let ny = player.y + player.vy;
    if(player.vy <= 0){
        if( collision( player.x, ny-1.8, player.z ) ){
            player.vy = 0;
            if (!inWater) player.ground = true;
            while( collision( player.x, player.y-1.8, player.z ) ){
                player.y += .01;
            }
        } else {
            player.y = ny;
            if (!inWater) player.ground = false;
        }
    } else {
        if( !collision( player.x, ny, player.z ) ){
            player.y = ny;
        } else {
            player.vy = 0;
        }
    }
}

if(keys["KeyA"]) mx-=1;
if(keys["KeyD"]) mx+=1;


if(mx||mz){

let len=Math.hypot(mx,mz);

mx/=len;
mz/=len;


// camera yaw conversion
let sin=Math.sin(yaw);
let cos=Math.cos(yaw);


let dx = (mx * cos) + (mz * sin);
let dz = (mz * cos) + (mx * sin); 



let nx=player.x+dx*speed;


if(!collision(
nx,
player.y,
player.z
)){

player.x=nx;

}



let nz=player.z+dz*speed;


if(!collision(
player.x,
player.y,
nz
)){

player.z=nz;

}


}

}

    let n = hit.face.normal; 
    let x = p[0]+n.x; 
    let y = p[1]+n.y; 
    let z = p[2]+n.z; 
    let cx = Math.floor( x/CHUNK_SIZE ); 
    let cz = Math.floor( z/CHUNK_SIZE ); 

    setBlock( cx, cz, x-cx*CHUNK_SIZE, y, z-cz*CHUNK_SIZE, selectedBlock ); 
    rebuildChunk( cx, cz ); 

    triggerAutosave(); 
  } 
});









// ---------- GAME LOOP ----------



let lastCX=null;

let lastCZ=null;





function loop(){



move();


physics();


updateCamera();





let cx=
Math.floor(
player.x/CHUNK_SIZE
);


let cz=
Math.floor(
player.z/CHUNK_SIZE
);




if(
cx!==lastCX ||
cz!==lastCZ
){


loadChunks(
player.x,
player.z
);



lastCX=cx;

lastCZ=cz;


}





renderer.render(
scene,
camera
);

document.getElementById("coordOverlay").innerHTML = `XYZ: ${player.x.toFixed(2)} / ${player.y.toFixed(2)} / ${player.z.toFixed(2)}<br>Chunk: ${cx}, ${cz}`;



requestAnimationFrame(loop);


}







loadChunks(
player.x,
player.z
);

setInterval(tick3DWaterPhysics, 300);

loop();






window.onresize=()=>{


camera.aspect=
innerWidth/innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
innerWidth,
innerHeight
);


};
</script>
