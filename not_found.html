<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 – Well, this is awkward</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0f172a;
      --fg: #e5e7eb;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--fg);
    }
    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 480px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 1rem;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }
    h1 {
      font-size: 3.5rem;
      margin: 0 0 0.5rem;
      letter-spacing: 0.08em;
    }
    .emoji {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    p {
      margin: 0.4rem 0;
      line-height: 1.5;
      color: #cbd5f5;
    }
    .hint {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 0.75rem;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      background: linear-gradient(135deg, #0f172a, #1d283a);
      gap: 0.4rem;
      transition: transform 0.1s ease, box-shadow 0.1s ease, border-color 0.1s ease;
    }
    a.button span.arrow {
      transition: transform 0.15s ease;
    }
    a.button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(56, 189, 248, 0.25);
    }
    a.button:hover .arrow {
      transform: translateX(3px);
    }
    .code {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
      background: rgba(15, 23, 42, 0.9);
      padding: 0.25rem 0.5rem;
      border-radius: 0.4rem;
      border: 1px dashed rgba(148, 163, 184, 0.6);
      display: inline-block;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="emoji">🧭</div>
    <h1>404</h1>
    <p><strong>Lost in the void.</strong></p>
    <p>The page you’re looking for doesn’t exist, never existed, or is hiding from you specifically.</p>
    <p class="hint">Possible causes include: typos, broken links, or the universe being slightly against you today.</p>
    <div class="code">ERROR: route_not_found // fallback: send_user_home()</div>
    <a class="button" href="/">
      <span>Take me back home</span>
      <span class="arrow">🏠</span>
    </a>
  </main>
</body>
</html>
