<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOSSt9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #eef2f7;
            margin: 0;
            user-select: none;
        }

        .phone-container {
            background-color: #2b303a;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            width: 320px;
        }

        .screen {
            background-color: #a3c9a8; 
            color: #1c311c;
            font-family: monospace;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 4px solid #1a1e24;
        }

        #text-output {
            width: 100%;
            height: 70px;
            font-size: 18px;
            border: none;
            background: transparent;
            resize: none;
            outline: none;
            color: #1c311c;
            font-weight: bold;
        }

        .suggestion-bar {
            height: 25px;
            border-top: 1px dashed #1c311c;
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            overflow-x: auto;
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            background: linear-gradient(135deg, #4f5d75, #374151);
            color: white;
            border: 1px solid #1a1e24;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 6px rgba(0,0,0,0.3);
        }

        button:active {
            background: #2d3748;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transform: translateY(1px);
        }

        button .num {
            font-size: 22px;
            font-weight: bold;
        }

        button .letters {
            font-size: 10px;
            color: #d1d5db;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        button.action-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        button.next-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        button.space-btn { background: linear-gradient(135deg, #4b5563, #374151); }
        button.mode-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            transition: all 0.2s ease;
        }
        button.mode-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            animation: pulse 1s infinite alternate;
        }

        button.save-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="screen">
            <textarea id="text-output" readonly placeholder="Loading API dictionary..."></textarea>
            <div class="suggestion-bar" id="suggestion-bar">Status: Initializing firmware...</div>
        </div>

        <div class="grid">
            <button class="mode-btn" id="mode-btn" onclick="toggleMode()">
                <span class="num">1</span>
                <span class="letters" id="mode-label">Mode: T9</span>
            </button>
            <button onclick="pressNum('2')">
                <span class="num">2</span>
                <span class="letters">abc</span>
            </button>
            <button onclick="pressNum('3')">
                <span class="num">3</span>
                <span class="letters">def</span>
            </button>

            <button onclick="pressNum('4')">
                <span class="num">4</span>
                <span class="letters">ghi</span>
            </button>
            <button onclick="pressNum('5')">
                <span class="num">5</span>
                <span class="letters">jkl</span>
            </button>
            <button onclick="pressNum('6')">
                <span class="num">6</span>
                <span class="letters">mno</span>
            </button>

            <button onclick="pressNum('7')">
                <span class="num">7</span>
                <span class="letters">pqrs</span>
            </button>
            <button onclick="pressNum('8')">
                <span class="num">8</span>
                <span class="letters">tuv</span>
            </button>
            <button onclick="pressNum('9')">
                <span class="num">9</span>
                <span class="letters">wxyz</span>
            </button>

            <button id="utility-btn" class="next-btn" onclick="cycleWords()">
                <span class="num">*</span>
                <span class="letters" id="utility-label">Next Match</span>
            </button>
            <button class="space-btn" onclick="pressSpace()">
                <span class="num">0</span>
                <span class="letters">Space ␣</span>
            </button>
            <button class="space-btn" onclick="backspace()">
                <span class="num">⌫</span>
                <span class="letters">Back</span>
            </button>
        </div>
    </div>
    <script>
        var t9Map = {
            '2': ['a', 'b', 'c'], '3': ['d', 'e', 'f'],
            '4': ['g', 'h', 'i'], '5': ['j', 'k', 'l'], '6': ['m', 'n', 'o'],
            '7': ['p', 'q', 'r', 's'], '8': ['t', 'u', 'v'], '9': ['w', 'x', 'y', 'z']
        };

        var wordFrequencies = {};
        var t9Dictionary = {}; 
        var currentSequence = ''; 
        var textHistory = '';     
        var currentMatchIndex = 0;
        var singleDigitOverride = false; 

        var textOutput = document.getElementById('text-output');
        var suggestionBar = document.getElementById('suggestion-bar');
        var modeLabel = document.getElementById('mode-label');
        var modeBtn = document.getElementById('mode-btn');
        var utilityBtn = document.getElementById('utility-btn');
        var utilityLabel = document.getElementById('utility-label');

        function loadRemoteDictionary() {
            fetch('https://githubusercontent.com')
                .then(function(response) {
                    if (!response.ok) throw new Error('Network issue');
                    return response.text();
                })
                .then(function(textData) {
                    var wordsArray = textData.split('\n').map(function(w) { 
                        return w.trim().toLowerCase(); 
                    }).filter(function(w) { 
                        return w.length > 0; 
                    });
                    
                    wordsArray.forEach(function(word, index) {
                        wordFrequencies[word] = 10000 - index;
                    });

                    compileT9Map(wordsArray);
                    textOutput.placeholder = 'Type numbers...';
                    suggestionBar.textContent = 'T9 Ready. 10k words optimized.';
                })
                .catch(function(error) {
                    console.error('Failed to load dictionary:', error);
                    var fallbacks = ['the', 'hello', 'good', 'home', 'book', 'cool', 'work', 'program', 'today', 'please'];
                    fallbacks.forEach(function(word, index) { 
                        wordFrequencies[word] = 10 - index; 
                    });
                    compileT9Map(fallbacks);
                    suggestionBar.textContent = 'Emergency Offline T9 Ready.';
                });
        }

        function compileT9Map(words) {
            var letterToDigit = {};
            Object.keys(t9Map).forEach(function(digit) {
                t9Map[digit].forEach(function(letter) { 
                    letterToDigit[letter] = digit; 
                });
            });

            words.forEach(function(word) {
                var numericSequence = '';
                for (var i = 0; i < word.length; i++) {
                    var digit = letterToDigit[word[i]];
                    if (digit) numericSequence += digit;
                }
                if (numericSequence) {
                    if (!t9Dictionary[numericSequence]) t9Dictionary[numericSequence] = [];
                    if (t9Dictionary[numericSequence].indexOf(word) === -1) {
                        t9Dictionary[numericSequence].push(word);
                    }
                }
            });
            sortDictionaryByFrequency();
        }

        function sortDictionaryByFrequency() {
            Object.keys(t9Dictionary).forEach(function(sequence) {
                t9Dictionary[sequence].sort(function(a, b) {
                    return (wordFrequencies[b] || 0) - (wordFrequencies[a] || 0);
                });
            });
        }

        function toggleMode() {
            if (currentSequence.length > 0) { pressSpace(); }
            singleDigitOverride = true;
            modeLabel.textContent = 'Next: 123';
            modeBtn.classList.add('active');
            suggestionBar.textContent = 'Numeric injection armed for next press.';
        }

        function pressNum(num) {
            if (singleDigitOverride) {
                var trailingSpace = textHistory ? ' ' : '';
                textHistory += trailingSpace + num;
                singleDigitOverride = false;
                modeLabel.textContent = 'Mode: T9';
                modeBtn.classList.remove('active');
            } else {
                currentSequence += num;
                currentMatchIndex = 0; 
            }
            updateDisplay();
        }

        function cycleWords() {
            if (currentSequence.length === 0) return;
            var matches = t9Dictionary[currentSequence] || [];
            if (matches.length > 1) {
                currentMatchIndex = (currentMatchIndex + 1) % matches.length;
                updateDisplay();
            }
        }

        function saveCustomWord() {
            var promptText = 'Enter custom word matching the number sequence [' + currentSequence + ']:';
            var word = prompt(promptText);
            if (word) {
                var cleanedWord = word.trim().toLowerCase();
                if (cleanedWord.length !== currentSequence.length) {
                    alert('Error: Word length must precisely match your phone keystroke count!');
                    return;
                }
                wordFrequencies[cleanedWord] = 20000; 
                compileT9Map([cleanedWord]);
                updateDisplay();
            }
        }

        function pressSpace() {
            var matches = t9Dictionary[currentSequence] || [];
            var activeWord = matches[currentMatchIndex] || currentSequence;
            
            if (matches.length > 0 && matches[currentMatchIndex]) {
                var selectedWord = matches[currentMatchIndex];
                wordFrequencies[selectedWord] = (wordFrequencies[selectedWord] || 0) + 1500;
                sortDictionaryByFrequency();
            }

            var trailingSpace = textHistory ? ' ' : '';
            textHistory += trailingSpace + activeWord;
            currentSequence = '';
            currentMatchIndex = 0;
            updateDisplay();
        }

        function backspace() {
            if (currentSequence.length > 0) {
                currentSequence = currentSequence.slice(0, -1);
                currentMatchIndex = 0;
            } else if (textHistory.length > 0) {
                if (textHistory.substring(textHistory.length - 1) === ' ') {
                    textHistory = textHistory.slice(0, -1);
                } else {
                    var words = textHistory.split(' ');
                    words.pop();
                    textHistory = words.join(' ');
                }
            }
            updateDisplay();
        }

        function updateDisplay() {
            var matches = t9Dictionary[currentSequence] || [];
            var activeWord = matches[currentMatchIndex] || currentSequence;
            var trailingSpace = (textHistory && activeWord) ? ' ' : '';
            var fullOutput = textHistory + trailingSpace + activeWord;
            
            textOutput.value = fullOutput;

            utilityBtn.className = 'next-btn';
            utilityBtn.setAttribute('onclick', 'cycleWords()');
            utilityLabel.textContent = 'Next Match';

            if (currentSequence.length > 0) {
                if (matches.length > 0) {
                    var displayMatches = matches.slice(0, 4).join(', ');
                    suggestionBar.textContent = '(' + (currentMatchIndex + 1) + '/' + matches.length + ') Matches: ' + displayMatches;
                } else {
                    suggestionBar.textContent = 'Unknown Sequence!';
                    utilityBtn.className = 'save-btn';
                    utilityBtn.setAttribute('onclick', 'saveCustomWord()');
                    utilityLabel.textContent = 'Save Word';
                }
            } else {
                if (!singleDigitOverride) suggestionBar.textContent = 'T9 Core Online.';
            }
            textOutput.scrollTop = textOutput.scrollHeight;
        }

        loadRemoteDictionary();
    </script>
</body>
</html>
