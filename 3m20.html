<!DOCTYPE html>
<html>
<head>
  <title>3 Moves to 0</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; text-align: center; margin-top: 40px; }
    #circle {
      position: relative;
      width: 350px;
      height: 350px;
      margin: auto;
    }
    .tile {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: gold;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      border: 2px solid #aa8800;
    }
    #ops button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h2>3 Moves to 0</h2>

<p><b>Total:</b> <span id="total">-</span></p>
<p><b>Moves:</b> <span id="moves">0</span> / 3</p>

<div id="ops">
  <button onclick="setOp('+')">+</button>
  <button onclick="setOp('-')">-</button>
</div>

<div id="circle"></div>

<button onclick="newPuzzle()">New Puzzle</button>

<script>
let tiles = [];
let originalTiles = [];
let positions = [];
let total = null;
let moves = 0;
let op = null;
let usedIndices = [];

function generateSolvableSet() {
  let a = Math.floor(Math.random()*20)+1;
  let b = Math.floor(Math.random()*20)+1;
  let c = a + b;
  let extras = [];
  for (let i=0; i<6; i++) extras.push(Math.floor(Math.random()*20)+1);
  let arr = [a,b,c,...extras];
  return arr.sort(() => Math.random() - 0.5);
}

function renderCircle() {
  const circle = document.getElementById("circle");
  circle.innerHTML = "";

  let radius = 140;
  let cx = 175, cy = 175;

  tiles.forEach((num, i) => {
    if (num === null) return;

    let angle = (i / tiles.length) * (2 * Math.PI);
    let x = cx + radius * Math.cos(angle) - 30;
    let y = cy + radius * Math.sin(angle) - 30;

    positions[i] = {x, y};

    let div = document.createElement("div");
    div.className = "tile";
    div.style.left = x + "px";
    div.style.top = y + "px";
    div.textContent = num;
    div.onclick = () => clickTile(i);

    circle.appendChild(div);
  });
}

function clickTile(i) {
  if (tiles[i] === null) return;

  let value = tiles[i];

  if (total === null) {
    total = value;
    tiles[i] = null;
    usedIndices.push(i);
    moves = 1;
  } else if (op !== null) {
    total = op === '+' ? total + value : total - value;
    tiles[i] = null;
    usedIndices.push(i);
    moves++;
    op = null;

    if (moves === 3) {
      if (total === 0) {
        alert("Correct! Tiles cleared.");
      } else {
        alert("Incorrect. Restoring tiles.");
        restoreTiles();
      }
      resetRound();
    }
  }

  updateUI();
  renderCircle();
}

function restoreTiles() {
  usedIndices.forEach(i => {
    tiles[i] = originalTiles[i];
  });
}

function resetRound() {
  total = null;
  moves = 0;
  op = null;
  usedIndices = [];
}

function setOp(o) {
  op = o;
}

function updateUI() {
  document.getElementById("total").textContent = total === null ? "-" : total;
  document.getElementById("moves").textContent = moves;
}

function newPuzzle() {
  tiles = generateSolvableSet();
  originalTiles = [...tiles];
  resetRound();
  updateUI();
  renderCircle();
}

newPuzzle();
</script>

</body>
</html>
