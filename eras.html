<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Evolution Museum</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    transition: .35s ease;
}

#tabs {
    position: sticky;
    top: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px;
    background: #111;
    z-index: 999;
}

#tabs button {
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    background: #333;
    color: white;
}

#content {
    min-height: 100vh;
    padding: 20px;
}

/* ================= 1993 ================= */
.s1993 { background: #c0c0c0; font-family: serif; }
.s1993 .page {
    width: 780px;
    margin: auto;
    background: white;
    border: 3px ridge gray;
    padding: 20px;
}

/* ================= 1997 ================= */
.s1997 { background: url("https://dummyimage.com/20x20/ff00ff/000&text=*"); }
.s1997 .page {
    width: 780px;
    margin: auto;
    background: white;
    border: 6px double hotpink;
    padding: 20px;
}

/* ================= 2001 ================= */
.s2001 { background: #001a33; color: white; }
.s2001 .header { background:#003366; padding:20px; font-size:28px; }
.s2001 .sidebar { float:left; width:200px; background:#002244; padding:10px; }
.s2001 .main { margin-left:220px; }

/* ================= 2004 ================= */
.s2004 { background: linear-gradient(#9ad1ff, #fff); }
.s2004 .card { width:760px; margin:auto; background:white; padding:15px; margin-bottom:10px; }

/* ================= 2007 ================= */
.s2007 { background: linear-gradient(#cfeaff,#fff); }
.s2007 .glass { width:760px; margin:auto; background:rgba(255,255,255,.5); backdrop-filter:blur(10px); padding:20px; }

/* ================= 2010 ================= */
.s2010 { background:#e9e9e9; }
.s2010 .blog { width:760px; margin:auto; background:white; padding:20px; border-left:4px solid #999; }

/* ================= 2013 ================= */
.s2013 { background:#f7f7f7; }
.s2013 .card { width:760px; margin:auto; background:white; padding:20px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.2); }

/* ================= 2016 ================= */
.s2016 { background:#fafafa; }
.s2016 .dashboard {
    width:760px;
    margin:auto;
}
.s2016 .panel {
    background:white;
    margin:10px 0;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

/* ================= 2018 ================= */
.s2018 { background:white; }
.s2018 .landing { text-align:center; font-size:34px; }
.s2018 .box { width:760px; margin:auto; background:white; padding:15px; }

/* ================= 2020 ================= */
.s2020 { background:#f1f3f5; }
.s2020 .feed { width:700px; margin:auto; }
.s2020 .post { background:white; padding:15px; margin:10px 0; border-radius:12px; }

/* ================= 2022 ================= */
.s2022 { background:#0d0f14; color:white; }
.s2022 .feed { width:700px; margin:auto; }
.s2022 .post { background:#1b1f2a; padding:15px; margin:10px 0; border-radius:12px; }

/* ================= 2024 ================= */
.s2024 { background:#0b0d10; color:white; }
.s2024 .layout {
    width:760px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 300px;
    gap:15px;
}
.s2024 .card {
    background:#1c2028;
    padding:15px;
    border-radius:12px;
}
.s2024 .sidebar {
    background:#12151c;
    padding:15px;
    border-radius:12px;
}

/* ================= 2026 AI SLOP ================= */
.s2026 {
    background:#06070b;
    color:white;
}
.s2026 .topbar {
    position:sticky;
    top:0;
    background:rgba(20,20,30,.9);
    display:flex;
    justify-content:space-between;
    padding:10px;
    font-size:12px;
}
.s2026 .live { color:#00ff9d; animation:blink 1s infinite; }
@keyframes blink { 50% { opacity:.3; } }

.s2026 .grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:20px;
}
.s2026 .panel {
    background:rgba(255,255,255,.04);
    padding:15px;
    border-radius:16px;
    backdrop-filter:blur(10px);
}
.s2026 .ai {
    background:linear-gradient(90deg,rgba(255,0,200,.06),rgba(0,255,255,.06));
    padding:10px;
    margin-top:10px;
    border:1px dashed rgba(255,255,255,.2);
}

/* ================= 2026 INDIE ================= */
.s2026indie {
    background:#fdfaf5;
    color:#111;
    font-family:Georgia,serif;
}
.s2026indie .page {
    width:800px;
    margin:auto;
}
.s2026indie .box {
    border:1px solid #aaa;
    padding:15px;
    margin-top:10px;
    background:white;
}

</style>
</head>

<body class="s1993">

<div id="tabs">
<button onclick="setEra('s1993')">1993</button>
<button onclick="setEra('s1997')">1997</button>
<button onclick="setEra('s2001')">2001</button>
<button onclick="setEra('s2004')">2004</button>
<button onclick="setEra('s2007')">2007</button>
<button onclick="setEra('s2010')">2010</button>
<button onclick="setEra('s2013')">2013</button>
<button onclick="setEra('s2016')">2016</button>
<button onclick="setEra('s2018')">2018</button>

<button onclick="setEra('s2022')">2022</button>
<button onclick="setEra('s2024')">2024</button>
<button onclick="setEra('s2026')">2026 AI</button>

</html>
