<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFS</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" type="image/png" href="/a9logo.png">
    <style>
      #files {
        width: 100%;
        margin-top: 16px;
        background: white;
        border-radius: 12px;
        padding: 10px;
        box-sizing: border-box;
        font-family: Verdana;
      }

      .file {
        padding: 6px 8px;
        cursor: pointer;
        border-radius: 6px;
        margin-bottom: 4px;
        user-select: none;
      }

      .file:hover {
        background: #eaeaea;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        background-color: #000;
        color: #feff38;
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        font-family: Verdana;
        font-weight: bold;
        cursor: pointer;
      }

      input[type="file"] {
        font-family: Verdana;
      }
    </style>
  </head>
  <body>
  <div id="topbar">
      <p>Welcome to
        <img src="a9corner.png" style="border-radius: 6px;">
        <a href="/index.html">Home</a> | 
        <a href="/projects.html">Apps</a> | 
        <a href="/links.html">Links</a>
      </p> 
  </div>

  <div style="width: 90%;
  height: 80vh;
  margin: 5vh 5%;
  padding: 1rem;
  background-color: #feff38;
  border-radius: 16px;
  box-sizing: border-box;
  overflow-wrap: break-word;
  display: flex;
  overflow: auto;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;">
  
    <div class="controls">
      <input type="file" id="fileInput">
      <button id="uploadBtn">Upload</button>
    </div>

    <div id="files">No files uploaded.</div>

  </div>

<script>
  // Neocities-safe VFS (no IndexedDB, no localStorage size issues)
  const vfs = {};

  const input = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const filesDiv = document.getElementById("files");

  uploadBtn.onclick = () => {
    const file = input.files[0];
    if (!file) {
      alert("Select a file first.");
      return;
    }

    // Create a persistent blob URL (works for large files like MP3)
    const blobURL = URL.createObjectURL(file);

    vfs[file.name] = {
      url: blobURL,
      type: file.type,
      size: file.size
    };

    input.value = "";
    renderFiles();
  };

  function renderFiles() {
    filesDiv.innerHTML = "";
    const names = Object.keys(vfs);

    if (names.length === 0) {
      filesDiv.textContent = "No files uploaded.";
      return;
    }

    names.forEach(name => {
      const file = vfs[name];

      const div = document.createElement("div");
      div.className = "file";

      const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
      div.textContent = `📄 ${name} (${sizeMB} MB)`;

      // Opens like a virtual file (better than data:// for audio)
      div.onclick = () => {
        window.open(file.url, "_blank");
      };

      filesDiv.appendChild(div);
    });
  }
</script>
  </body>
</html>
