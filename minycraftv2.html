// TEXTURE GENERATOR


function textureCanvas(draw){

let c=document.createElement("canvas");

c.width=16;
c.height=16;


let ctx=c.getContext("2d");


draw(ctx);



let tex=new THREE.CanvasTexture(c);

tex.magFilter=THREE.NearestFilter;

tex.colorSpace=THREE.SRGBColorSpace;


return tex;

}





function noise(base,amount){

return Math.floor(
base+(Math.random()*amount*2-amount)
);

}







// GRASS

let grassTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


let green=
noise(150,30);


ctx.fillStyle=
`rgb(${noise(40,10)},${green},${noise(40,10)})`;


ctx.fillRect(
x,y,1,1
);


}

}


});






// DIRT

let dirtTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){


ctx.fillStyle=

`rgb(${noise(130,20)},${noise(80,15)},${noise(40,10)})`;


ctx.fillRect(
x,y,1,1
);


}

}


});







// STONE

let stoneTex=textureCanvas(ctx=>{


for(let x=0;x<16;x++){

for(let y=0;y<16;y++){

`rgb(${n},${n},${n})`;


ctx.fillRect(
x,y,1,1
);

});

function updateHotbar(){ 
  hotbar.innerHTML=""; 
  
  for(let i=0; i<hotbarBlocks.length; i++){ 
    let slot=document.createElement("div"); 
    slot.className="slot"; 
    
    if(hotbarBlocks[i]==selectedBlock) slot.classList.add("active"); 
    
    let img=document.createElement("canvas"); 
    img.width=32; 
    img.height=32; 
    let ctx=img.getContext("2d"); 
    
    let tex=materials[hotbarBlocks[i]].map; 
    
    // Fallback lookups to ensure Three.js provides the raw image element
    let actualImage = tex && (tex.image || (tex.source && tex.source.data) || tex.element);
    
    if(actualImage){ 
      ctx.imageSmoothingEnabled=false; 
      ctx.drawImage( actualImage, 0, 0, 32, 32 ); 
    } 
    
    // Create the HTML img element instead of using slot.style.backgroundImage
    let thumbnailImg = document.createElement("img");
    thumbnailImg.src = img.toDataURL();
    thumbnailImg.className = "hotbar-icon";
    
    // Append the image inside the slot
    slot.appendChild(thumbnailImg);
    
    hotbar.appendChild(slot); 
  } 
}

function exportWorld() {
  const allData = {};
  
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    allData[key] = localStorage.getItem(key);
  }
  
  const jsonString = JSON.stringify(allData, null, 2);
  const blob = new Blob([jsonString], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  
  const link = document.createElement("a");
  link.href = url;
  link.download = "minycraft_world.json";
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function importWorld() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";

  input.onchange = (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const importedData = JSON.parse(e.target.result);
        localStorage.clear();

        for (const key in importedData) {
          localStorage.setItem(key, importedData[key]);
        }

        location.reload();
      } catch (error) {
        alert("Invalid world file!");
      }
    };
    reader.readAsText(file);
  };

  input.click();
}

// ---------- CHUNKS ----------

let chunks={};



function chunkKey(x,z){

return x+","+z;

}


function blockKey(x,y,z){

return x+","+y+","+z;

}





function getChunk(cx,cz){ 
  let k=chunkKey(cx,cz); 
  
  if(!chunks[k]){ 
    chunks[k]={ 
      blocks:{}, 
      mesh:null, 
      cx:cx, 
      cz:cz 
    }; 
    
    // Check if the browser remembers this specific chunk key
    let savedData = localStorage.getItem(`chunk_${k}`);
    
    if (savedData) {
      // If it exists, unpack user's saved block layout directly into the chunk!
      chunks[k].blocks = JSON.parse(savedData);
    }
  } 
  
  return chunks[k]; 
}





function setBlock(cx,cz,x,y,z,b){

let c=getChunk(
cx,
cz
);


let k=blockKey(
x,
y,
z
);


if(b)

c.blocks[k]=b;

else

delete c.blocks[k];

}





function getBlock(x,y,z){


let cx=Math.floor(
x/CHUNK_SIZE
);


let cz=Math.floor(
z/CHUNK_SIZE
);



let lx=x-cx*CHUNK_SIZE;

let lz=z-cz*CHUNK_SIZE;



let c=chunks[
chunkKey(cx,cz)
];



if(!c)
return 0;



return c.blocks[
blockKey(lx,y,lz)
]||0;


}






// ---------- TERRAIN ----------


function terrainHeight(x,z){


let n=

Math.sin(x*.08)+
Math.cos(z*.1)+
Math.sin((x+z)*.04);



return Math.floor(
8+n*3
);


}





function generateChunk(cx,cz){


let c=getChunk(
cx,
cz
);


if(Object.keys(c.blocks).length)
return;





for(let x=0;x<CHUNK_SIZE;x++){


for(let z=0;z<CHUNK_SIZE;z++){



let wx=
cx*CHUNK_SIZE+x;


let wz=
cz*CHUNK_SIZE+z;



let h=
terrainHeight(
wx,
wz
);





for(let y=0;y<=h;y++){


let b;



if(y==h)

b=BLOCK.GRASS;


else if(y>h-3)

b=BLOCK.DIRT;


else

b=BLOCK.STONE;




setBlock(
cx,
cz,
x,
y,
z,
b
);


}






// trees


if(
Math.random()<.035 &&
h>6
){



for(let y=1;y<=4;y++){

setBlock(
cx,
cz,
x,
h+y,
z,
BLOCK.WOOD
);

}





for(let xx=-2;xx<=2;xx++){


for(let zz=-2;zz<=2;zz++){


if(
Math.abs(xx)+Math.abs(zz)<4
){


setBlock(
cx,
cz,
x+xx,
h+5,
z+zz,
BLOCK.LEAF
);


}


}


}



}




}


}



}







// ---------- BLOCK VISIBILITY ----------


function visibleBlock(x,y,z){


return(

getBlock(x+1,y,z)==0 ||

getBlock(x-1,y,z)==0 ||

getBlock(x,y+1,z)==0 ||

getBlock(x,y-1,z)==0 ||

getBlock(x,y,z+1)==0 ||

getBlock(x,y,z-1)==0

);


}







// ---------- BUILD CHUNK ----------


function rebuildChunk(cx,cz){

let c=getChunk(
cx,
cz
);



if(c.mesh){

scene.remove(
c.mesh
);

}




let group=
new THREE.Group();





for(let k in c.blocks){


let p=
k.split(",").map(Number);



let wx=
cx*CHUNK_SIZE+p[0];


let wz=
cz*CHUNK_SIZE+p[2];





if(!visibleBlock(
wx,
p[1],
wz
))
continue;





let blockValue = c.blocks[k];
let materialKey = typeof blockValue === "string" ? parseInt(blockValue.split("_")[0]) : blockValue;
let mesh = new THREE.Mesh(cubeGeo, materials[materialKey]);



mesh.position.set(

wx+.5,

p[1]+.5,

wz+.5

);





mesh.userData.block=true;


mesh.userData.pos=[

wx,

p[1],

wz

];



group.add(mesh);



}




scene.add(group);


c.mesh=group;


}




let autosaveTimeout;

function triggerAutosave() {
  // 1. If you are clicking fast to break/place multiple blocks, 
  // clear the old timer so the game doesn't stutter or freeze.
  clearTimeout(autosaveTimeout);

  // 2. Wait 500 milliseconds (half a second) of quiet time before saving.
  autosaveTimeout = setTimeout(() => {
    
    // 3. Loop through every single active chunk in your game engine memory
    for (let key in chunks) {
      let c = chunks[key];
      
      // Check if the chunk exists and has blocks placed inside it
      if (c && c.blocks && Object.keys(c.blocks).length > 0) {
        
        // 4. Pack the entire chunk's block object into a tiny JSON string 
        // Example structure saved: {"0,5,0": 1, "0,4,0": 3}
        let packedChunkData = JSON.stringify(c.blocks);
        
        // 5. Store it directly in LocalStorage labeled by its unique chunk key (like "chunk_0,0")
        localStorage.setItem(`chunk_${key}`, packedChunkData);
        
      } else {
        // If a chunk becomes completely empty (you broke all the custom blocks), 
        // remove its save file so it doesn't take up empty storage space.
        localStorage.removeItem(`chunk_${key}`);
      }
    }
    
    console.log("Minycraft Chunk-Autosave completed in background!");
  }, 500); // 500ms delay
}



// ---------- LOAD AREA ----------


function loadChunks(px,pz){


let cx=
Math.floor(
px/CHUNK_SIZE
);


let cz=
Math.floor(
pz/CHUNK_SIZE
);





for(let x=-RENDER_DISTANCE;x<=RENDER_DISTANCE;x++){


for(let z=-RENDER_DISTANCE;z<=RENDER_DISTANCE;z++){



let nx=cx+x;

let nz=cz+z;



generateChunk(
nx,
nz
);


rebuildChunk(
nx,
nz
);



}


}







// unload


for(let k in chunks){


let c=chunks[k];


if(

Math.abs(c.cx-cx)>RENDER_DISTANCE ||

Math.abs(c.cz-cz)>RENDER_DISTANCE

){


if(c.mesh)

scene.remove(c.mesh);

triggerAutosave();
  
delete chunks[k];


}


}



}

function tick3DWaterPhysics() {
    let activeWaterBlocks = [];
    
    for (let ck in chunks) {
        let chunk = chunks[ck];
        for (let bk in chunk.blocks) {
            let val = chunk.blocks[bk];
            let isSource = val === BLOCK.WATER;
            let isFlow = typeof val === "string" && val.startsWith(BLOCK.WATER + "_F_");
            
            if (isSource || isFlow) {
                let localPos = bk.split(",").map(Number);
                let wx = chunk.cx * CHUNK_SIZE + localPos[0];
                let wz = chunk.cz * CHUNK_SIZE + localPos[2];
                let currentLvl = isSource ? 4 : parseInt(val.split("_F_")[1]);
                activeWaterBlocks.push({ x: wx, y: localPos[1], z: wz, lvl: currentLvl, source: isSource });
            }
        }
    }

    let newBlocksToPlace = [];
    let chunksToRebuild = new Set();

    function checkBlock(x, y, z) {
        let b = getBlock(x, y, z);
        if (b === BLOCK.WATER) return 4;
        if (typeof b === "string" && b.startsWith(BLOCK.WATER + "_F_")) return parseInt(b.split("_F_")[1]);
        return b; 
    }

    activeWaterBlocks.forEach(w => {
        let blockBelow = getBlock(w.x, w.y - 1, w.z);
        
        // Water can ONLY fall down if the block below is completely empty air
        if (blockBelow === BLOCK.AIR) {
            let downLvl = w.source ? 4 : w.lvl; 
            newBlocksToPlace.push({ x: w.x, y: w.y - 1, z: w.z, lvl: downLvl });
        } 
        else {
            let spreadLvl = w.lvl - 1;
            if (spreadLvl > 0) {
                let neighbors = [
                    { x: w.x + 1, y: w.y, z: w.z },
                    { x: w.x - 1, y: w.y, z: w.z },
                    { x: w.x, y: w.y, z: w.z + 1 },
                    { x: w.x, y: w.y, z: w.z - 1 }
                ];
                neighbors.forEach(n => {
                    let targetRawBlock = getBlock(n.x, n.y, n.z);
                    let targetWaterLvl = checkBlock(n.x, n.y, n.z);

                    // CRITICAL FIX: Only spread if the block is AIR, or if it is already water but has lower pressure
                    if (targetRawBlock === BLOCK.AIR || (typeof targetRawBlock === "string" && targetRawBlock.startsWith(BLOCK.WATER + "_F_") && targetWaterLvl < spreadLvl)) {
                        newBlocksToPlace.push({ x: n.x, y: n.y, z: n.z, lvl: spreadLvl });
                    }
                });
            }
        }
    });

    newBlocksToPlace.forEach(nb => {
        let cx = Math.floor(nb.x / CHUNK_SIZE);
        let cz = Math.floor(nb.z / CHUNK_SIZE);
        let lx = nb.x - cx * CHUNK_SIZE;
        let lz = nb.z - cz * CHUNK_SIZE;
        
        let existingRaw = getBlock(nb.x, nb.y, nb.z);
        let existingLvl = checkBlock(nb.x, nb.y, nb.z);
        
        // Double check to make sure we don't accidentally stomp a solid block during application
        if (existingRaw === BLOCK.AIR || (typeof existingRaw === "string" && existingRaw.startsWith(BLOCK.WATER + "_F_") && existingLvl < nb.lvl)) {
            let valueToStore = nb.lvl === 4 ? BLOCK.WATER : BLOCK.WATER + "_F_" + nb.lvl;
            setBlock(cx, cz, lx, nb.y, lz, valueToStore);
            chunksToRebuild.add(chunkKey(cx, cz));
        }
    });

    chunksToRebuild.forEach(ckey => {
        let p = ckey.split(",").map(Number);
        rebuildChunk(p[0], p[1]);
        triggerAutosave();
    });

    activeWaterBlocks = null;
    newBlocksToPlace = null;
}

if(e.code=="Digit6")selectedBlock=BLOCK.LEAF;
if(e.code=="Digit7")selectedBlock=BLOCK.GLASS;
if(e.code=="Digit8")selectedBlock=BLOCK.GLOW;
if(e.code=="Digit9")selectedBlock=BLOCK.BRICK;
if(e.code=="Digit0")selectedBlock=BLOCK.WATER;

updateHotbar();

if(
e.code=="Space" &&
player.ground
){

player.vy=.28;

player.ground=false;

}


});





document.addEventListener(
"keyup",
e=>{

keys[e.code]=false;

});







renderer.domElement.onclick=()=>{

renderer.domElement.requestPointerLock();

};






document.addEventListener(
"mousemove",
e=>{


if(
document.pointerLockElement
){


yaw-=e.movementX*.002;


pitch-=e.movementY*.002;


pitch=Math.max(
-1.5,
Math.min(
1.5,
pitch
)
);


}


});







// ---------- COLLISION ----------



function solid(x,y,z){

return getBlock(
Math.floor(x),
Math.floor(y),
Math.floor(z)
)!=0;

}





function collision(x,y,z){


let r=player.radius;

let h=player.height;



return(

solid(x-r,y,z-r) ||

solid(x+r,y,z-r) ||

solid(x-r,y,z+r) ||

solid(x+r,y,z+r) ||


solid(x-r,y+h,z-r) ||

solid(x+r,y+h,z-r) ||

solid(x-r,y+h,z+r) ||

solid(x+r,y+h,z+r)

);



}







function physics(){


player.vy-=.012;



let ny=
player.y+player.vy;





if(player.vy<=0){



if(
collision(
player.x,
ny-1.8,
player.z
)
){



player.vy=0;

player.ground=true;



while(
collision(
player.x,
player.y-1.8,
player.z
)
){

player.y+=.01;

}



}

else{


player.y=ny;

player.ground=false;


}



}

else{


if(
!collision(
player.x,
ny,
player.z
)
){

player.y=ny;

}

else{

player.vy=0;

}



}


}








// ---------- MOVEMENT ----------


function move(){

let speed=.12;

let mx=0;
let mz=0;


if(keys["KeyW"]) mz-=1;
if(keys["KeyS"]) mz+=1;
if(keys["KeyA"]) mx-=1;
if(keys["KeyD"]) mx+=1;


if(mx||mz){

let len=Math.hypot(mx,mz);

mx/=len;
mz/=len;


// camera yaw conversion
let sin=Math.sin(yaw);
let cos=Math.cos(yaw);


let dx = (mx * cos) + (mz * sin);
let dz = (mz * cos) + (mx * sin); 



let nx=player.x+dx*speed;


if(!collision(
nx,
player.y,
player.z
)){

player.x=nx;

}



let nz=player.z+dz*speed;


if(!collision(
player.x,
player.y,
nz
)){

player.z=nz;

}


}

}







// ---------- CAMERA ----------


function updateCamera(){


camera.position.set(

player.x,

player.y+1.6,

player.z

);



camera.rotation.order="YXZ";


camera.rotation.y=yaw;

camera.rotation.x=pitch;


}






// ---------- BLOCK EDITING ----------


let raycaster=
new THREE.Raycaster();





function targetBlock(){


raycaster.setFromCamera(

new THREE.Vector2(0,0),

camera

);



let hits=
raycaster.intersectObjects(
scene.children,
true
);



for(let h of hits){


if(
h.object.userData.block
)

return h;


}



return null;


}






renderer.domElement.oncontextmenu=e=>{

e.preventDefault();

};






renderer.domElement.addEventListener(
"mousedown",
e=>{


let hit=
targetBlock();



if(!hit)
return;




let p=
hit.object.userData.pos;





  if(e.button==0){ 
    let cx = Math.floor( p[0]/CHUNK_SIZE ); 
    let cz = Math.floor( p[2]/CHUNK_SIZE ); 

    setBlock( cx, cz, p[0]-cx*CHUNK_SIZE, p[1], p[2]-cz*CHUNK_SIZE, 0 ); 
    rebuildChunk( cx, cz ); 

    triggerAutosave(); 
  } 
  
  if(e.button==2){ 
    let n = hit.face.normal; 
    let x = p[0]+n.x; 
    let y = p[1]+n.y; 
    let z = p[2]+n.z; 
    let cx = Math.floor( x/CHUNK_SIZE ); 
    let cz = Math.floor( z/CHUNK_SIZE ); 

    setBlock( cx, cz, x-cx*CHUNK_SIZE, y, z-cz*CHUNK_SIZE, selectedBlock ); 
    rebuildChunk( cx, cz ); 

    triggerAutosave(); 
  } 
});









// ---------- GAME LOOP ----------



let lastCX=null;

let lastCZ=null;





function loop(){



move();


physics();


updateCamera();





let cx=
Math.floor(
player.x/CHUNK_SIZE
);


let cz=
Math.floor(
player.z/CHUNK_SIZE
);




if(
cx!==lastCX ||
cz!==lastCZ
){


loadChunks(
player.x,
player.z
);



lastCX=cx;

lastCZ=cz;


}





renderer.render(
scene,
camera
);



requestAnimationFrame(loop);


}







loadChunks(
player.x,
player.z
);

setInterval(tick3DWaterPhysics, 300);

loop();






window.onresize=()=>{


camera.aspect=
innerWidth/innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
innerWidth,
innerHeight
);


};
</script>
